services:
  - type: web
    name: sevasetu-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
